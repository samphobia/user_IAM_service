server:
  port: ${SERVER_PORT:8090}

spring:
  application:
    name: user-iam-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/user_iam}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true

app:
  jwt:
    secret: ${APP_JWT_SECRET:}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:3600000}
  aaas:
    enabled: ${APP_AAAS_ENABLED:false}
    fail-open: ${APP_AAAS_FAIL_OPEN:true}
    base-url: ${APP_AAAS_BASE_URL:http://localhost:8080}
    api-key: ${APP_AAAS_API_KEY:dev-default-api-key}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.company.iam: INFO
