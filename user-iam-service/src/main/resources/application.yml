server:
  port: ${SERVER_PORT:8090}

spring:
  application:
    name: user-iam-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/user_iam}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true

app:
  aaas:
    base-url: ${APP_AAAS_BASE_URL:}
    api-key: ${APP_AAAS_API_KEY:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.company.iam: INFO
